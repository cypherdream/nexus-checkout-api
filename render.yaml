services:
  - type: web
    name: nexus-checkout-api
    env: python
    region: oregon
    plan: free
    runtime: python-3.10
    buildCommand: pip install poetry && poetry install --no-root
    startCommand: poetry run uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: DATABASE_URL
        scope: build,runtime
      - key: REDIS_HOST
        scope: build,runtime
      - key: REDIS_PORT
        scope: build,runtime
      - key: SECRET_KEY
        scope: build,runtime
      - key: ALGORITHM
        scope: build,runtime
      - key: ACCESS_TOKEN_EXPIRE_MINUTES
        scope: build,runtime
      - key: TWILIO_ACCOUNT_SID
        scope: build,runtime
      - key: TWILIO_AUTH_TOKEN
        scope: build,runtime
      - key: TWILIO_FROM_NUMBER
        scope: build,runtime
      - key: STRIPE_SECRET_KEY
        scope: build,runtime
      - key: STRIPE_PUBLISHABLE_KEY
        scope: build,runtime

  - type: background
    name: nexus-checkout-worker
    env: python
    region: oregon
    plan: free
    runtime: python-3.10
    buildCommand: pip install poetry && poetry install --no-root
    startCommand: poetry run arq task_queue.main.WorkerSettings
    envVars:
      - key: DATABASE_URL
        scope: build,runtime
      - key: REDIS_HOST
        scope: build,runtime
      - key: REDIS_PORT
        scope: build,runtime
